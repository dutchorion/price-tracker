name: Price Tracker

on:
  schedule:
    # Runs every 6 hours — adjust as you like (cron syntax, UTC)
    # Examples:
    #   "0 */4 * * *"  = every 4 hours
    #   "0 8,20 * * *" = twice a day at 08:00 and 20:00 UTC
    - cron: "0 */6 * * *"
  workflow_dispatch:  # allows manual run from GitHub UI

permissions:
  contents: write  # needed to commit prices.json back to repo

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py

      - name: Commit updated price history
        run: |
          git config user.name "price-tracker[bot]"
          git config user.email "price-tracker@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update price history $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
